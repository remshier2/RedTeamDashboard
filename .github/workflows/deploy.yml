name: Deploy

# Push image to ACR; the ACR Task deploy-rtd fires automatically on push and
# rolls the Container App — no Container Apps credentials in CI.
#
# Trigger from:
#   - GitHub UI: Actions tab -> Deploy -> "Run workflow"
#   - CLI:       gh workflow run deploy.yml
#
# Required repository VARIABLES (Settings -> Secrets and variables -> Actions -> Variables):
#   AZURE_CLIENT_ID         App registration's client (application) ID
#   AZURE_TENANT_ID         Entra tenant ID
#   AZURE_SUBSCRIPTION_ID   Subscription where the ACR lives
#   AZURE_ACR_NAME          ACR registry name (from install.sh output, e.g. "rtdprodacr")
#
# Required federated credential on the App registration:
#   subject: repo:<owner>/<repo>:ref:refs/heads/main
#   audience: api://AzureADTokenExchange
#   role: AcrPush scoped to the ACR resource (NOT Container Apps Contributor)
#
# Set up with: infra/azure-kit/scripts/setup-github-deploy.sh
# ACR Task:    infra/azure-kit/scripts/setup-acr-deploy.sh

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC for Azure login (ACR push only)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          REGISTRY="${{ vars.AZURE_ACR_NAME }}.azurecr.io"
          {
            echo "backend_sha=${REGISTRY}/rtd-backend:main-${SHORT_SHA}"
            echo "worker_sha=${REGISTRY}/rtd-worker:main-${SHORT_SHA}"
            echo "backend_main=${REGISTRY}/rtd-backend:main"
            echo "worker_main=${REGISTRY}/rtd-worker:main"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend / worker images
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Push both the immutable SHA tag (for audit/rollback) and the mutable
          # :main tag that the ACR Task deploy-rtd watches to trigger the update.
          tags: |
            ${{ steps.tags.outputs.backend_sha }}
            ${{ steps.tags.outputs.backend_main }}
            ${{ steps.tags.outputs.worker_sha }}
            ${{ steps.tags.outputs.worker_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment triggered via ACR Task
        run: |
          echo "Pushed: ${{ steps.tags.outputs.backend_sha }}"
          echo "The ACR Task deploy-rtd will now roll the Container App automatically."
          echo "Monitor: az acr task list-runs --registry ${{ vars.AZURE_ACR_NAME }} -o table"
