# Release pipeline — runs ONLY on `v*` tag pushes.
#
# Strict gating: any CRITICAL/HIGH Trivy finding fails the publish; a tag
# never produces images that haven't been scanned clean. CodeQL runs out-of-
# band via GitHub's default setup (default setup and custom-workflow uploads
# can't coexist on the same repo).
#
# What gets published per release `v0.1.0`:
#   - ghcr.io/<owner>/rtd-backend:0.1.0  (+ :latest)
#   - ghcr.io/<owner>/rtd-worker:0.1.0   (+ :latest, alias of rtd-backend)
#   - ghcr.io/<owner>/rtd-viewer:0.1.0   (+ :latest)
#   - GitHub Release v0.1.0 with rtd-azure-kit-v0.1.0.tar.gz attached and
#     auto-generated changelog from commit messages.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create the GitHub Release + upload assets
  packages: write       # push to GHCR
  security-events: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a half-published release

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Resolve version once so every downstream job uses the same string.
  # `v0.1.0` -> version=0.1.0 (no `v` prefix in image tags), tag=v0.1.0.
  # ---------------------------------------------------------------------------
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      owner_lc: ${{ steps.v.outputs.owner_lc }}
    steps:
      - id: v
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "owner_lc=$owner_lc"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Tests must pass on the exact tagged commit before we build anything.
  # Duplicates the CI backend job; intentional — we want this self-contained.
  # ---------------------------------------------------------------------------
  test:
    name: Test on tagged commit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtd
          POSTGRES_PASSWORD: rtd
          POSTGRES_DB: rtd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtd -d rtd"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://rtd:rtd@localhost:5432/rtd
      REDIS_URL: redis://localhost:6379/0
      # See ci.yml for why ollama is the default here.
      LLM_PROVIDER: ollama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - working-directory: backend
        run: ruff check app tests
      - working-directory: backend
        run: alembic upgrade head
      # SSE tests bypass the ASGI transport and need a real HTTP server.
      - name: Start uvicorn for SSE tests
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "uvicorn ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "uvicorn failed to start; log:"
          cat /tmp/uvicorn.log
          exit 1
      - working-directory: backend
        run: pytest -q
      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci --no-audit --no-fund
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run lint

  # ---------------------------------------------------------------------------
  # CodeQL runs via GitHub's default setup (enabled at the repo level) — it
  # scans on push/PR/schedule independently. Default setup and custom workflow
  # uploads can't coexist, so we don't gate the release on CodeQL here. Trivy
  # below still STRICT-gates the image publish on CRITICAL/HIGH CVEs.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Build, Trivy-scan, and push each image. Matrix so backend + viewer run in
  # parallel; the worker reuses the backend image (tagged again at the end).
  # ---------------------------------------------------------------------------
  publish:
    name: Build + scan + publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: [version, test]
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: rtd-backend
            context: backend
            dockerfile: backend/Dockerfile
            extra_build_args: ''
          - name: rtd-viewer
            context: frontend
            dockerfile: frontend/Dockerfile
            # Multi-source viewer: don't bake an API base into the bundle.
            # Phase 6 reworks this to read connections from runtime config.
            extra_build_args: |
              NEXT_PUBLIC_API_BASE=
            target: runner
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally (for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          build-args: ${{ matrix.image.extra_build_args }}
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image.name }}:${{ needs.version.outputs.version }}

      # Report-only table scan first so the build log shows which CVEs Trivy
      # found before the strict SARIF scan exits non-zero.
      - name: Trivy image scan (report — list CVEs in log)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image.name }}:${{ needs.version.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: table

      - name: Trivy image scan (STRICT — fails the release)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image.name }}:${{ needs.version.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          # Without this, format=sarif forces trivy to scan ALL severities
          # and the exit-code check fires on any finding — defeating the
          # CRITICAL/HIGH gate. With this on, severity filter applies to
          # both SARIF contents and the exit-code calculation.
          limit-severities-for-sarif: 'true'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Tag :latest and push
        run: |
          IMG="${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/${{ matrix.image.name }}"
          VER="${{ needs.version.outputs.version }}"
          docker tag "$IMG:$VER" "$IMG:latest"
          docker push "$IMG:$VER"
          docker push "$IMG:latest"

  # ---------------------------------------------------------------------------
  # Tag the backend image as rtd-worker so the kit's Bicep (which references
  # two image names) keeps working. Same digest, same scan result.
  # ---------------------------------------------------------------------------
  publish-worker-alias:
    name: Publish worker alias
    runs-on: ubuntu-latest
    needs: [version, publish]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Re-tag backend image as worker
        run: |
          IMG_BACKEND="${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/rtd-backend"
          IMG_WORKER="${{ env.REGISTRY }}/${{ needs.version.outputs.owner_lc }}/rtd-worker"
          VER="${{ needs.version.outputs.version }}"
          docker pull "$IMG_BACKEND:$VER"
          docker tag "$IMG_BACKEND:$VER" "$IMG_WORKER:$VER"
          docker tag "$IMG_BACKEND:$VER" "$IMG_WORKER:latest"
          docker push "$IMG_WORKER:$VER"
          docker push "$IMG_WORKER:latest"

  # ---------------------------------------------------------------------------
  # rtd-cli — build sdist + wheel, run its own tests, publish to PyPI via
  # trusted publishing (OIDC; no token in secrets). The PyPI project needs to
  # be created once with a trusted publisher config matching this repo + this
  # workflow filename; the first release without that pre-config will fail at
  # the publish step and only the publish step.
  # ---------------------------------------------------------------------------
  publish-cli:
    name: Publish rtd-cli to PyPI
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      id-token: write   # required for PyPI trusted publisher
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build pytest pytest-httpx

      - name: Smoke-test the CLI
        working-directory: cli
        run: |
          pip install -e ".[dev]"
          pytest -q

      - name: Verify CLI version matches the release tag
        working-directory: cli
        run: |
          pkg_ver="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag_ver="${{ needs.version.outputs.version }}"
          if [ "$pkg_ver" != "$tag_ver" ]; then
            echo "::error::cli/pyproject.toml version ($pkg_ver) doesn't match release tag ($tag_ver). Bump it before tagging."
            exit 1
          fi

      - name: Build wheel + sdist
        working-directory: cli
        run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          # No password / username — trusted publishing maps the GitHub OIDC
          # token to the PyPI project via pre-configured trust on pypi.org.

  # ---------------------------------------------------------------------------
  # Build the static viewer bundle for Azure Static Web Apps. End users'
  # install.sh downloads this zip + uploads it to their SWA resource — they
  # don't need npm or a build pipeline locally.
  # ---------------------------------------------------------------------------
  publish-viewer-static:
    name: Publish viewer static bundle
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_OUTPUT: export
          NODE_ENV: production
        run: npm run build

      - name: Zip the bundle
        working-directory: frontend
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          cd out && zip -qr "../../rtd-viewer-static-${TAG}.zip" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtd-viewer-static
          path: rtd-viewer-static-*.zip
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Bundle the Azure deployment kit + cut the GitHub Release. Runs last so the
  # release page links to a kit whose images are already pushable.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, publish, publish-worker-alias, publish-cli, publish-viewer-static]
    steps:
      - uses: actions/checkout@v4

      - name: Download viewer static bundle
        uses: actions/download-artifact@v4
        with:
          name: rtd-viewer-static
          path: .

      - name: Package the Azure kit
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          tar -czf "rtd-azure-kit-${TAG}.tar.gz" -C infra azure-kit

      - name: Create release + attach kit tarball + viewer bundle
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ needs.version.outputs.tag }}
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            rtd-azure-kit-*.tar.gz
            rtd-viewer-static-*.zip
          body: |
            ## Images

            All pushed to GitHub Container Registry (public, no auth required):

            - `ghcr.io/${{ needs.version.outputs.owner_lc }}/rtd-backend:${{ needs.version.outputs.version }}`
            - `ghcr.io/${{ needs.version.outputs.owner_lc }}/rtd-worker:${{ needs.version.outputs.version }}` (alias of backend)
            - `ghcr.io/${{ needs.version.outputs.owner_lc }}/rtd-viewer:${{ needs.version.outputs.version }}`

            ## CLI

            ```bash
            pip install rtd-cli==${{ needs.version.outputs.version }}
            ```

            ## Deploy

            Download `rtd-azure-kit-${{ needs.version.outputs.tag }}.tar.gz` below, then:

            ```bash
            tar -xzf rtd-azure-kit-${{ needs.version.outputs.tag }}.tar.gz
            cd azure-kit
            ./scripts/install.sh --env prod --image-tag ${{ needs.version.outputs.version }}
            ```

            See `KIT.md` in the tarball for the full walkthrough.
