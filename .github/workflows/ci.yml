# Continuous integration on every PR and push to main.
#
# Report-only on PRs per the locked design: scans surface findings to the
# Security tab but never block a merge. Releases (.github/workflows/release.yml)
# are where strict gating happens — CRITICAL/HIGH there fails the publish.
#
# Backend tests run against real Postgres + Redis service containers (no mocks
# — the suite has integration tests against actual DB + Streams). Frontend
# does tsc + next lint.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + pytest with real Postgres + Redis
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtd
          POSTGRES_PASSWORD: rtd
          POSTGRES_DB: rtd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtd -d rtd"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://rtd:rtd@localhost:5432/rtd
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      # SSE tests in test_events_api.py bypass FastAPI's ASGI transport (it
      # buffers streaming responses) and hit a real uvicorn on localhost:8000.
      # Locally that's the docker-compose backend container; in CI we start
      # uvicorn here as a background process.
      - name: Start uvicorn for SSE tests
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "uvicorn ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "uvicorn failed to start; log:"
          cat /tmp/uvicorn.log
          exit 1

      - name: Pytest
        working-directory: backend
        run: pytest -q

      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi

  # ---------------------------------------------------------------------------
  # Frontend: tsc + next lint
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (tsc + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ---------------------------------------------------------------------------
  # CodeQL — python + TS in parallel. Report-only on PRs.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan — surfaces dependency CVEs without building images.
  # Image scans live in the release workflow where they gate the publish.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'  # report-only on PRs/main
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
